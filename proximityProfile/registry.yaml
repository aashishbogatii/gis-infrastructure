# Proximity source registry — the sources the proximity service probes.
#
# Each entry:
#   schema, table  -> locate the curated source
#   attributes     -> columns returned in each match's `attributes` JSON
#   type           -> "proximity" (contains or within radius) | "containment"
#   radius_m       -> proximity search radius (ignored for containment)
#   mode           -> "feature" (default, one row per matching feature) | "count"
#                     (aggregate per category) | "nearest" (closest feature only)
#   group_by       -> column to partition by; with mode "count" it's the category
#                     counted (e.g. crime category_normalized), with mode "nearest"
#                     it's the key kept per group (e.g. one reading per pollutant)
#   filter         -> SQL WHERE applied to the source before the spatial test, to
#                     drop irrelevant rows (e.g. roads -> primary/secondary only)
#   collapse       -> nearest mode: pack the per-group rows into ONE row,
#                     {group: reading} (e.g. AQI -> {pollutant: {...}} map)
#
# radius_m values are set as a climate analyst + property assessor: far enough to
# capture a real, defensible disamenity effect on value, not so far it overreaches
# before a Board of Equalization. Tune per local evidence.

default_radius_m: 1000

sources:

  energy_cec_coolingcost:
    schema: climate
    table: energy_cec_coolingcost
    type: containment
    attributes: [geoid, delta_cdd, delta_cooling_cost_usd]

  heat_cec_extreme_heat:
    schema: climate
    table: heat_cec_extreme_heat
    type: containment
    attributes: [geoid, delta_p98_days, delta_days_over_100f]

  crime_ca:
    schema: crime
    table: crime_ca
    mode: count
    group_by: category_normalized
    radius_m: 1600

  dmr_allmine:
    schema: environmental
    table: dmr_allmine
    radius_m: 1600
    attributes: [mine_id, mine_status, operator, primary_product]

  env_epa_aqi:
    schema: environmental
    table: env_epa_aqi
    mode: nearest
    group_by: parameter_name
    collapse: true
    radius_m: 10000
    filter: "parameter_name IN ('PM2.5 - Local Conditions','PM10 Total 0-10um STP','Ozone','Sulfur dioxide','Nitrogen dioxide (NO2)','Carbon monoxide')"
    attributes: [parameter_name, annual_mean, max_value, exceedances, site_name]

  env_epa_brownfields_acres:
    schema: environmental
    table: env_epa_brownfields_acres
    radius_m: 800
    attributes: [facility_name, registry_id, county]

  env_epa_landfill:
    schema: environmental
    table: env_epa_landfill
    radius_m: 1600
    attributes: [landfill_name, status, area_acres, waste_in_place_tons]

  env_epa_superfund_npl:
    schema: environmental
    table: env_epa_superfund_npl
    radius_m: 10000
    attributes: [epa_id, site_name, npl_status_code]

  env_swrcb_geotracker:
    schema: environmental
    table: env_swrcb_geotracker
    radius_m: 3000
    attributes: [global_id, business_name, case_type, status, contaminants]

  mining_osmre_amlis:
    schema: environmental
    table: mining_osmre_amlis
    radius_m: 800
    attributes: [amlis_key, problem_type, problem_area, reclamation_status]

  water_swrcb_gama:
    schema: environmental
    table: water_swrcb_gama
    radius_m: 800
    attributes: [well_id, well_category, chemical_name, result, result_units, sample_date]

  # --- infrastructure ---
  hifdl_refineries:
    schema: infrastructure
    table: hifdl_refineries
    radius_m: 2000
    attributes: [site_id, company, site, atmos_dist_mbpd]

  tl_rails:
    schema: infrastructure
    table: tl_rails
    radius_m: 300
    attributes: [linearid, fullname, mtfcc]

  tl_roads:
    schema: infrastructure
    table: tl_roads
    radius_m: 150
    filter: "mtfcc IN ('S1100','S1200')"

  # --- natural_hazard ---
  flood_dwm_dam_breach_inundation:
    schema: natural_hazard
    table: flood_dwm_dam_breach_inundation
    radius_m: 250
    attributes: [dam_name, scenario, loading_scenario, hazard_class]

  flood_fema_nfhl:
    schema: natural_hazard
    table: flood_fema_nfhl
    radius_m: 250
    attributes: [fld_zone, zone_subty, sfha_tf]

  flood_noaa_slrv:
    schema: natural_hazard
    table: flood_noaa_slrv
    radius_m: 250
    attributes: [region, scenario_type, scenario_ft]

  landslide_usgs_inventories:
    schema: natural_hazard
    table: landslide_usgs_inventories
    radius_m: 300
    attributes: [usgs_id, ls_type, confidence, fatalities]

  landslide_usgs_susceptibility:
    schema: natural_hazard
    table: landslide_usgs_susceptibility
    radius_m: 200
    attributes: [susceptibility_class]

  seismic_cgs_fault_zones:
    schema: natural_hazard
    table: seismic_cgs_fault_zones
    radius_m: 200
    attributes: [quad_name, zone_revised, global_id]

  seismic_cgs_landslide_zones:
    schema: natural_hazard
    table: seismic_cgs_landslide_zones
    radius_m: 200
    attributes: [quad_name, zone_revised, global_id]

  seismic_cgs_liquefaction_zones:
    schema: natural_hazard
    table: seismic_cgs_liquefaction_zones
    radius_m: 200
    attributes: [quad_name, zone_revised, global_id]

  seismic_usgs_nshm:
    schema: natural_hazard
    table: seismic_usgs_nshm
    radius_m: 500
    attributes: [fault_id, fault_name, dip_deg]

  seismic_usgs_qffd:
    schema: natural_hazard
    table: seismic_usgs_qffd
    radius_m: 500
    attributes: [fault_name, fault_id, age, slip_rate, slip_sense]

  tornado_spc_tornado_tracks:
    schema: natural_hazard
    table: tornado_spc_tornado_tracks
    radius_m: 1000
    attributes: [event_date, magnitude, injuries, fatalities, loss]

  tsunami_cgs_hazard_area:
    schema: natural_hazard
    table: tsunami_cgs_hazard_area
    radius_m: 250
    attributes: [county, in_hazard_area]

  wildfire_calfire_fhsz:
    schema: natural_hazard
    table: wildfire_calfire_fhsz
    radius_m: 500
    attributes: [fhsz_code, fhsz_class, jurisdiction]

  wildfire_calfire_wui:
    schema: natural_hazard
    table: wildfire_calfire_wui
    radius_m: 500
    attributes: [wui_num, haz_num, housing_density, wui_desc, haz_desc]

  wildfire_nifc_fil:
    schema: natural_hazard
    table: wildfire_nifc_fil
    radius_m: 1000
    attributes: [incident_name, incident_type, final_acres, fire_cause, discovery_date]

  wildfire_usfs_whp:
    schema: natural_hazard
    table: wildfire_usfs_whp
    type: containment
    attributes: [hazard_class]

  wildfire_usgs_mtbs:
    schema: natural_hazard
    table: wildfire_usgs_mtbs
    radius_m: 1000
    attributes: [severity_class]

  hud_lmip:
    schema: socioeconomic
    table: hud_lmip
    type: containment
    attributes: [geoid, county_name, lowmod, lowmod_pct]
